name: build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Fetch tessdata (eng)
        shell: pwsh
        run: ./scripts/fetch-tessdata.ps1

      - name: Build
        shell: pwsh
        run: dotnet build ./CopyDecrypt/CopyDecrypt.csproj -c Release

